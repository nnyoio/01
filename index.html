<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>hiraeth</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23C4856A' stroke-width='2' stroke-linecap='round'><circle cx='12' cy='12' r='10'/><circle cx='12' cy='12' r='3'/><line x1='12' y1='2' x2='12' y2='5'/><line x1='12' y1='19' x2='12' y2='22'/></svg>">
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<header id="hdr">
  <div id="logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
    hiraeth
  </div>
  <div id="swatches"></div>
  <div id="hdr-right"></div>
</header>

<section id="hero" class="grain">
  <div class="grad"></div>
  <div class="inner">
    <h1>:D<br><span></span></h1>
    <p>좋아하는 노래를 검색해서 모두와 공유하세요</p>
    <div id="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="q" type="text" placeholder="노래 제목 또는 아티스트..." autocomplete="off"/>
      <div id="results"></div>
    </div>
  </div>
</section>

<main>
  <div class="divider" onclick="toggleSection('picks')" style="cursor:pointer">
    <span>오늘의 추천곡을 추가해보세요</span>
    <span id="picks-chevron" style="font-size:11px;color:var(--s);margin-left:8px">∨</span>
  </div>
  <div id="picks"></div>
  <div id="discover-wrap" style="display:none">
    <div class="divider" onclick="toggleSection('discover')" style="cursor:pointer">
      <span>둘러보기</span>
      <button onclick="event.stopPropagation();renderDiscover()" style="font-size:11px;color:var(--s);border:1px solid var(--b);padding:2px 10px;border-radius:999px;margin-left:8px">↻</button>
      <span id="discover-chevron" style="font-size:11px;color:var(--s);margin-left:6px">∨</span>
      <div style="display:flex;gap:4px;margin-left:8px">
        <button id="dg1" onclick="setDiscoverGrid(1)" style="font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--b);color:var(--s)">1</button>
        <button id="dg2" onclick="setDiscoverGrid(2)" style="font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--b);color:var(--s)">2</button>
        <button id="dg4" onclick="setDiscoverGrid(4)" style="font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--b);color:var(--s)">4</button>
      </div>
    </div>
    <div id="discover"></div>
  </div>
  <div id="lib">
    <div id="lib-header">
      <span id="lib-title">내 음악</span>
      <button onclick="openFolder()">+ 폴더</button>
    </div>
    <div id="folders"></div>
    <div id="feed"></div>
  </div>
</main>

<!-- 로그인 -->
<div class="overlay" id="ov-login" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal"><h3 id="login-title">로그인</h3><div id="login-body"></div></div>
</div>

<!-- 사용자 추가 -->
<div class="overlay" id="ov-user" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <h3>사용자 추가</h3>
    <input class="inp" id="un" type="text" placeholder="이름 또는 아이디" onkeydown="if(event.key==='Enter')document.getElementById('up').focus()"/>
    <p style="font-size:12px;color:var(--s);margin-bottom:8px">프로필 색상</p>
    <div id="up-colors" style="margin-bottom:10px"></div>
    <input class="inp" id="up" type="password" placeholder="비밀번호" maxlength="20" onkeydown="if(event.key==='Enter')addUser()"/>
    <button class="btn-p" onclick="addUser()">추가</button>
    <button class="btn-g" onclick="hide('ov-user')">취소</button>
  </div>
</div>

<!-- 폴더 -->
<div class="overlay" id="ov-folder" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <h3>새 폴더</h3>
    <input class="inp" id="fn" type="text" placeholder="폴더 이름"/>
    <button class="btn-p" onclick="mkFolder()">만들기</button>
    <button class="btn-g" onclick="hide('ov-folder')">취소</button>
  </div>
</div>

<!-- 개선점 -->
<div class="overlay" id="ov-feedback" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <h3>개선점 보내기</h3>
    <div style="display:flex;gap:6px;justify-content:center;margin-bottom:14px" id="fb-stars">
      <button onclick="setRating(1)" class="star-btn" data-v="1" style="font-size:24px;background:none;border:none;cursor:pointer;opacity:.3">★</button>
      <button onclick="setRating(2)" class="star-btn" data-v="2" style="font-size:24px;background:none;border:none;cursor:pointer;opacity:.3">★</button>
      <button onclick="setRating(3)" class="star-btn" data-v="3" style="font-size:24px;background:none;border:none;cursor:pointer;opacity:.3">★</button>
      <button onclick="setRating(4)" class="star-btn" data-v="4" style="font-size:24px;background:none;border:none;cursor:pointer;opacity:.3">★</button>
      <button onclick="setRating(5)" class="star-btn" data-v="5" style="font-size:24px;background:none;border:none;cursor:pointer;opacity:.3">★</button>
    </div>
    <textarea class="inp" id="fb-text" placeholder="불편한 점이나 개선됐으면 하는 것들 자유롭게 써줘! (선택)" rows="4" maxlength="500" style="resize:none"></textarea>
    <button class="btn-p" onclick="submitFeedback()">보내기</button>
    <button class="btn-g" onclick="hide('ov-feedback')">취소</button>
  </div>
</div>

<!-- 트랙 옵션 -->
<div class="overlay" id="ov-track" onclick="if(event.target===this)hide('ov-track')">
  <div class="modal">
    <p id="opt-name" style="font-size:14px;color:var(--t);font-weight:500;margin-bottom:3px"></p>
    <p id="opt-artist" style="font-size:12px;color:var(--s);margin-bottom:18px"></p>
    <div id="opt-actions"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="main.js"></script>
</body>
</html>
